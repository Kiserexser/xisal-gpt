<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xisal GPT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000000;
            font-family: 'Segoe UI', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 4rem;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .sub {
            color: #888;
            margin-bottom: 40px;
            font-size: 1.2rem;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary {
            background: #00ffcc;
            color: #000;
            border: 1px solid #00ffcc;
        }
        .btn-primary:hover {
            background: transparent;
            color: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
        }
        .btn-secondary {
            background: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }
        .btn-secondary:hover {
            background: #00ffcc;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ XISAL GPT</h1>
        <div class="sub">чёрный разум без границ</div>
        <div>
            <a href="dashboard.html" class="btn btn-primary">НАЧАТЬ</a>
        </div>
    </div>
</body>
</html>
